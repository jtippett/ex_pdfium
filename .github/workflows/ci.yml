name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Carry the pdfium binary pin forward from the old project. Bump via UPDATE_PROCEDURE.
  PDFIUM_TAG: "chromium/7506"

jobs:
  test:
    name: Test & lint (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # NIF ABI is backward-compatible, so one OTP exercises the code. The
          # release artifact (built against rustler's NIF version) loads on 27/28/29+.
          - otp: "27.2"
            elixir: "1.18.0"
    env:
      MIX_ENV: test
      EXPDFIUM_BUILD: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache mix deps
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/ex_pdfium/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/ex_pdfium/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # Tests use the dynamic pdfium binding — download libpdfium for the runner.
      - name: Download libpdfium (dynamic, for tests)
        run: |
          mkdir -p priv/pdfium
          url="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_TAG/\//%2F}/pdfium-linux-x64.tgz"
          curl -fsSL "$url" -o pdfium.tgz
          tar -xzf pdfium.tgz -C priv/pdfium lib/libpdfium.so
          mv priv/pdfium/lib/libpdfium.so priv/pdfium/
          rmdir priv/pdfium/lib || true

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check Elixir formatting
        run: mix format --check-formatted

      - name: Check Rust formatting
        working-directory: native/ex_pdfium
        run: cargo fmt --check

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Clippy
        working-directory: native/ex_pdfium
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: mix test
